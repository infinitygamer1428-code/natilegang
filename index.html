<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natile Gang</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    /* BACKGROUND IMAGE */
    body {
      background: url('logo.jpeg') no-repeat center center/cover;
      height: 100vh;
    }

    /* OVERLAY CONTENT */
    .overlay {
      height: 100vh;
      width: 100%;
      background: rgba(243, 243, 243, 0.1);
      backdrop-filter: brightness(0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .overlay h1 {
      font-size: 2rem;
      color: black;
      letter-spacing: 2px;
    }

    .overlay h2 {
      font-size: 3.5rem;
      font-weight: 700;
      color: black;
      margin-top: 10px;
    }

    /* BUTTON */
    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: black;
      color: rgb(239, 243, 6);
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
      transform: scale(1.05);
    }

    /* SECOND SECTION */
    .section {
      background: #070600;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #cefc00;
    }

    .section p {
      max-width: 700px;
      margin: auto;
      line-height: 1.6;
      color: #fefeff;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #000000;
      padding: 25px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: #787c70;
    }

    .card h3 {
      color: #e6f519;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 0.9rem;
    }

  </style>
</head>

<body>

  <!-- HERO SECTION -->
  <div class="overlay">
    <h1>WELCOME TO</h1>
    <h2>NATILE GANG</h2>
    <button class="btn" onclick="scrollToSection()">Enter</button>
  </div>

  <!-- MAIN CONTENT -->
  <section class="section" id="main">
    <h2>Community Engagement</h2>
    <p>
      
    </p>

    <div class="cards">
      <div class="card">
        <h3>Memories till the end</h3>
        <p>good times with the gang, and we will be together till the end of time
        </p>
      </div>

      <div class="card">
        <h3>Gang Activities</h3>
        <p>total 100% kazhap</p>
      </div>

      <div class="card">
        <h3>Trips&plans</h3>
        <p>exciting adventures and well-planned outings with the gang</p>
      </div>
    </div>
  </section>

  <!-- SCRIPT -->
  <script>
    function scrollToSection() {
      document.getElementById("main").scrollIntoView({
        behavior: "smooth"
      });
    }
  </script>

</body>
</html>
